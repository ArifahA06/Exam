<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse and Purchase</title>
    <link rel="stylesheet" href="Shop-Style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css">
</head>

<body>
     <header>
        <h2 class="logo"></h2>
        <nav class="navigation">
            <a href="About.html">About</a>
            <a href="Farmers.html">Farmers</a>
            <a href="Support.html">Support</a>
            <a href="Account.html">Account</a>
            <a href="Basket.html">
                <i class="ri-shopping-bag-fill"></i>
                <span class="cart-item-count"></span>
            </a>
        </nav>
    </header>

    <div class="cart">
        <div class="cart-header">
            <span>Products</span>
            <span>Price</span>
            <span>Quantity</span>
            <span>Total</span>
            <span>Remove</span>
        </div>

        <div class="cart-items">
            <div class="class-item">
            </div>
        </div>

        <div class="cart-total">
            <h3>Total</h3>
            <p>Subtotal <span class="subtotal">£0</span></p>
            <p>Delivery Fee <span>Free</span></p>
            <p>Grand Total <span class="grand-total">£0</span></p>
            <button class="btn">Proceed to Checkout</button>
        </div>
    </div>

     <script src="Shop-Script.js"></script>
</body>

</html>
