    <title>AI Chatbot</title>
    <link rel="stylesheet" href="Chatbot-Style.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css">
</head>

<body>

    <header>
        <h2 class="logo"></h2>
        <nav class="navigation">
            <a href="About.html">About</a>
            <a href="Farmers.html">Farmers</a>
            <a href="Shop.html">Shop</a>
            <a href="Support.html">Support</a>
            <a href="Account.php">Account</a>
        </nav>
    </header>

    <section>
        <div class="chatbot-popup">
            <div class="chat-header">
                <div class="header-info">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h2 class="logo-text">AI Chatbot</h2>
                </div>
                <button><i class="ri-arrow-down-s-line"></i></button>
            </div>

            <div class="chat-body">
                <div class="bot-messages">
                    <svg class="bot-avatar" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <div class="message-text">
                        Hello! I'm your AI assistant. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="chat-footer">
                <form action="" class="chat-form">
                    <textarea placeholder="Message..." class="message-input"></textarea>
                    <div class="chat-controls">
                        <button type="submit"><i class="ri-send-plane-line"></i></button>
                    </div>
                </form>
            </div>
        </div>
        <script src="Chatbot-Script.js"></script>
    </section>

</body>
