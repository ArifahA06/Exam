<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access</title>
    <link rel="stylesheet" href="Account-Style.css">
</head>

<body>

    <header>
        <h2 class="logo"></h2>
        <nav class="navigation">
            <a href="#">About</a>
            <a href="#">Farmers</a>
            <a href="Shop.html">Shop</a>
            <a href="#">Support</a>
            <button class="btnLogin-popup">Account</button>
        </nav>
    </header>

    <div class="wrapper">
        <span class="icon-close"><ion-icons name="close"></ion-icons></span>
        <div class="form-box login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icons name="mail"></ion-icons></span>
                    <input type="text" required>
                    <label>MembershipID</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icons name="lock-closed"></ion-icons></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have an account? <a href="#" class="register-link">Register</a></p>
                </div>
            </form>
        </div>
        
        <div class="form-box register">
            <h2>Register</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icons name="person"></ion-icons></span>
                    <input type="text" required>
                    <label>First Name</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icons name="person"></ion-icons></span>
                    <input type="text" required>
                    <label>Surname</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icons name="mail"></ion-icons></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icons name="lock-closed"></ion-icons></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> I agree to the terms and conditions</label>
                </div>
                <button type="submit" class="btn">Register</button>
                <div class="login-register">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>

</body>

<script src="Account-Script.js"></script>

</html>
