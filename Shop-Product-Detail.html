<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="Shop-Style.css">
</head>
<body>

    <header>
        <h2 class="logo"></h2>
        <nav class="navigation">
            <a href="About.html">About</a>
            <a href="Farmers.html">Farmers</a>
            <a href="Support.html">Support</a>
            <a href="Account.html">Account</a>
            <a href="Basket.html">
                <i class="ri-shopping-bag-line"></i>
                <span class="cart-item-count"></span>
            </a>
        </nav>

        <div class="product-detail">
            <div class="product-img">
                <div class="thumbnail-list">
                    <img src="#">
                    <img src="#">
                    <img src="#">
                    <img src="#">
                    <img src="#">
                </div>
                <div class="main-img">
                    <img src="#">
                </div>
            </div>
            <div class="product-info">
                <h2 class="title">Product Title</h2>
                <div class="rating">
                    <i class="ri-star-fill"></i>
                    <i class="ri-star-fill"></i>
                    <i class="ri-star-fill"></i>
                    <i class="ri-star-fill"></i>
                    <i class="ri-star-line"></i>
                    <span class="rating-value">4.5</span>
                </div>
                <span class="price">£0.79</span>

                <div class="quantity">
                    <p>Select quantity:</p>
                    <div></div>
                        <button class="qty-btn" id="decrease-qty">-</button>
                        <input type="text" id="quantity" value="1" readonly>
                        <button class="qty-btn" id="increase-qty">+</button>
                    </div>
                </div>
                <button class="btn" id="add-to-cart">Add to Cart</button>
                <div class="product-policy">
                    <h3>Delivery & Returns</h3>
                    <p>Free delivery on orders over £20. Returns accepted within 30 days.</p>
                </div>
            </div>
        </div>

    </header>

    <script src="Shop-Script.js"></script>
